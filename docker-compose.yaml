name: skyvisor-insight

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
      POSTGRES_DB: ${DB_NAME:-aviation-tracker-dev}
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - ./.data/db/docker-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--port", "6381", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6381:6381"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - ./.data/db/docker-redis:/data
