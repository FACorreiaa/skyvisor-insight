name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: go run github.com/a-h/templ/cmd/templ@v0.3.1020 generate
      - name: Check generated templates
        run: git diff --exit-code -- '**/*_templ.go'
      - name: Checkout API spec
        uses: actions/checkout@v6
        with:
          repository: FACorreiaa/skyvisor-api
          path: .skyvisor-api
          sparse-checkout: api/openapi.yaml
          sparse-checkout-cone-mode: false
      - name: Check generated API client
        run: |
          make api-client OPENAPI_SPEC=.skyvisor-api/api/openapi.yaml
          git diff --exit-code -- app/apiclient/gen
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./cmd/...

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: skyvisor-insight:ci
