name: Deploy to k3s staging

on:
  workflow_run:
    workflows: [Verify]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-k3s-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/facorreiaa/skyvisor-web

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve verified revision
        id: revision
        env:
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "sha=${VERIFIED_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.revision.outputs.sha }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Record immutable tag
        id: tag
        run: echo "value=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_SHA: ${{ steps.revision.outputs.sha }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:${{ steps.revision.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-staging:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out infrastructure repository
        uses: actions/checkout@v6
        with:
          repository: FACorreiaa/skyvisor-infra
          ref: main
          token: ${{ secrets.INFRA_TOKEN }}
      - name: Update staging image tag
        uses: mikefarah/yq@v4.53.2
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          cmd: yq -i '.image.tag = env(IMAGE_TAG)' apps/web/values-staging.yaml
      - name: Commit and push staging tag
        run: |
          git config user.name "skyvisor-web-ci"
          git config user.email "ci@skyvisor.app"
          git add apps/web/values-staging.yaml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(web): deploy ${IMAGE_TAG} to staging"
          git pull --rebase origin main
          git push origin main
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
